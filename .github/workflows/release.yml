name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  windows-mingw:
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: /opt/vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # System dependencies
      # ------------------------------------------------------------------
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mingw-w64            \
            nasm                 \
            ninja-build

      # ------------------------------------------------------------------
      # vcpkg — clone, bootstrap, enable binary caching via GHA cache
      # ------------------------------------------------------------------
      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            /opt/vcpkg/downloads
            /opt/vcpkg/buildtrees
          key: vcpkg-${{ hashFiles('examples/implayer/vcpkg.json', 'examples/implayer/overlay/imvideo/vcpkg.json') }}
          restore-keys: vcpkg-

      - name: Setup vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Enable vcpkg binary cache (GHA backend)
        run: |
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # Cross-compile for Windows
      # ------------------------------------------------------------------
      - name: Configure
        working-directory: examples/implayer
        run: cmake --preset mingw-static

      - name: Build
        working-directory: examples/implayer
        run: cmake --build build/mingw-static --parallel

      # ------------------------------------------------------------------
      # Upload artifact
      # ------------------------------------------------------------------
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ImPlayer-${{ github.ref_name }}
          path: examples/implayer/build/mingw-static/ImPlayer.exe

  release:
    needs: windows-mingw
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ImPlayer-${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## ImPlayer ${{ github.ref_name }}

            **Windows x86-64 静态链接构建**，无需额外运行时。

            - 基于 FFmpeg + Dear ImGui + GLFW
            - 双击即可运行，无终端窗口
          files: ImPlayer.exe
